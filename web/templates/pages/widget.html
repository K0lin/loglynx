{{define "widget.html"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>LogLynx Widget</title>
    <link rel="icon" type="image/svg+xml" href="/static/images/favicon.svg">
    <link href="/static/css/widget.css" rel="stylesheet">
</head>
<body class="theme-{{.Theme}}">
    <div class="widget-shell" id="widget" data-initial-mode="{{.Mode}}">
        <header class="widget-status-card">
            <div class="status-left">
                <div class="status-dot" id="statusDot"></div>
                <div>
                    <div class="status-text" id="statusText">Loading...</div>
                    <div class="status-meta" id="statusMeta">Initializing widget</div>
                </div>
            </div>
            <div class="time-badge" id="timeBadge">24h</div>
        </header>

        <nav class="widget-range-tabs" aria-label="Widget time range">
            <button type="button" data-mode="realtime">Live</button>
            <button type="button" data-mode="1h">1h</button>
            <button type="button" data-mode="24h">24h</button>
            <button type="button" data-mode="7d">7d</button>
            <button type="button" data-mode="30d">30d</button>
        </nav>

        <section class="widget-metrics" aria-label="LogLynx widget metrics">
            <a class="metric-card" href="/" target="_top" title="Open overview dashboard">
                <span class="metric-label" id="labelPrimary">Requests/min</span>
                <strong class="metric-value" id="valuePrimary">-</strong>
            </a>

            <a class="metric-card" href="/performance" target="_top" title="Open performance dashboard">
                <span class="metric-label">Avg Response</span>
                <strong class="metric-value" id="avgResponse">-<span class="unit">ms</span></strong>
            </a>

            <a class="metric-card" href="/traffic" target="_top" title="Open traffic analysis">
                <span class="metric-label">Error Rate</span>
                <strong class="metric-value" id="errorRate">-<span class="unit">%</span></strong>
            </a>

            <a class="metric-card" href="/traffic" target="_top" title="Open traffic analysis">
                <span class="metric-label" id="labelSecondary">Unique IPs</span>
                <strong class="metric-value" id="valueSecondary">-</strong>
            </a>
        </section>

        <section class="timeline-card" aria-label="Traffic timeline">
            <div class="timeline-header">
                <div>
                    <span class="metric-label" id="labelChart">Traffic</span>
                    <div class="timeline-subtitle" id="timelineSubtitle">Hover for details</div>
                </div>
                <div class="last-updated" id="lastUpdated">--:--</div>
            </div>
            <div class="timeline-wrap">
                <canvas id="sparkline" class="sparkline"></canvas>
                <div class="chart-tooltip" id="chartTooltip" hidden></div>
            </div>
        </section>
    </div>

    <script src="/static/js/pages/widget.js"></script>
</body>
</html>
{{end}}
