<!-- Modal for editing IP tags -->
<div class="modal fade" id="tag-modal" tabindex="-1" aria-labelledby="tagModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content" style="background: var(--loglynx-card); color: #FFFFFF;">
      <div class="modal-header" style="border-color: var(--border-color);">
        <h5 class="modal-title" id="tagModalLabel">
          <i class="fas fa-tag"></i> Edit IP Tag
        </h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label for="friendly-name" class="form-label">Friendly Name:</label>
          <input type="text" class="form-control" id="friendly-name">
        </div>
        <div class="mb-3">
          <label for="tags-input" class="form-label">Tags (comma-separated):</label>
          <input type="text" class="form-control" id="tags-input" placeholder="tag1, tag2, tag3">
        </div>
      </div>
      <div class="modal-footer" style="border-color: var(--border-color);">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
        <button type="button" class="btn btn-primary" onclick="saveTag()">Save</button>
      </div>
    </div>
  </div>
</div>
